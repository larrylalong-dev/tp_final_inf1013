databaseChangeLog:
  - changeSet:
      id: 002-create-messages
      author: tp-final
      changes:
        - createTable:
            tableName: messages
            columns:
              - column:
                  name: id
                  type: varchar(80)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: ad_id
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: owner_id
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: from_user_id
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: subject
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: body
                  type: varchar(4000)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: varchar(40)
                  constraints:
                    nullable: false
        - createIndex:
            tableName: messages
            indexName: idx_messages_ad_id
            columns:
              - column:
                  name: ad_id
        - createIndex:
            tableName: messages
            indexName: idx_messages_owner_id
            columns:
              - column:
                  name: owner_id

